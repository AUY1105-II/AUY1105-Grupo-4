name: Análisis IaC en pull request

# Requerimiento 3: activar solo ante pull request hacia main.
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality_and_security:
    name: TFLint → Checkov → Terraform validate → OPA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt -check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false -input=false

      # Etapa 1: análisis estático con TFLint
      - name: Instalar TFLint
        run: |
          curl -sL "https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh" | bash

      - name: TFLint init y ejecución
        run: |
          tflint --init
          tflint --minimum-failure-severity=warning

      # Etapa 2: análisis de seguridad con Checkov
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Checkov
        run: |
          checkov -d . --framework terraform --download-external-modules false --compact --skip-path policies

      # Etapa 3: validación Terraform
      - name: Terraform validate
        run: terraform validate

      # Políticas OPA en /policies (pruebas con opa test)
      - name: Instalar OPA
        run: |
          curl -sSL -o opa https://github.com/open-policy-agent/opa/releases/download/v0.69.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: OPA test (efectividad de políticas)
        run: opa test policies/
